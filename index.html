<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぐろーぐーのおるすばん</title>
  <meta property="og:title" content="ぐろーぐーのおるすばん">
  <meta property="og:description" content="非公式ゲーム">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://fukuba15.github.io/grogu-game/">
  <meta property="og:image" content="https://fukuba15.github.io/grogu-game/image/ogp.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://fukuba15.github.io/grogu-game/image/ogp.png">
  <style>
    :root {
      --bg-top: #dbeafe;
      --bg-mid: #fff7ed;
      --bg-bottom: #f0fdf4;
      --card: rgba(255, 255, 255, 0.92);
      --card-border: rgba(255, 255, 255, 0.85);
      --text: #334155;
      --text-soft: #64748b;
      --green: #65cfa6;
      --green-dark: #36a979;
      --blue: #7bb7e8;
      --orange: #f7b267;
      --pink: #f6a6b2;
      --red: #ef6f6c;
      --shadow: 0 14px 40px rgba(94, 122, 150, 0.18);
      --shadow-soft: 0 8px 20px rgba(94, 122, 150, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.9) 0 2px, transparent 3px),
        radial-gradient(circle at 84% 12%, rgba(255, 255, 255, 0.85) 0 2px, transparent 3px),
        radial-gradient(circle at 72% 34%, rgba(255, 255, 255, 0.75) 0 1px, transparent 2px),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 52%, var(--bg-bottom) 100%);
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 14px;
    }

    body::before {
      content: "✦";
      position: fixed;
      top: 8%;
      left: 9%;
      color: rgba(255, 255, 255, 0.9);
      font-size: 22px;
      animation: floatStar 3.5s ease-in-out infinite;
    }

    body::after {
      content: "☁";
      position: fixed;
      right: 8%;
      bottom: 8%;
      color: rgba(255, 255, 255, 0.65);
      font-size: 70px;
      animation: floatCloud 5s ease-in-out infinite;
    }

    @keyframes floatStar {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.9;
      }

      50% {
        transform: translateY(-8px) rotate(8deg);
        opacity: 0.55;
      }
    }

    @keyframes floatCloud {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(-12px);
      }
    }

    #game {
      position: relative;
      z-index: 2;
      max-width: 430px;
      width: 100%;
      margin: 0 auto;
    }

    .app-title {
      text-align: center;
      margin-bottom: 12px;
    }

    .app-title h1 {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 21px;
      line-height: 1.2;
      letter-spacing: 0.03em;
      color: #2f5f4d;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 999px;
      padding: 9px 16px;
      box-shadow: var(--shadow-soft);
    }

    .app-title p {
      margin-top: 7px;
      font-size: 12px;
      color: var(--text-soft);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 26px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .time-pill,
    .diff-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .time-pill {
      background: #fff7ed;
      color: #9a5b23;
      border: 1px solid #fed7aa;
    }

    /*
    .diff-pill.easy {
      background: #ecfdf5;
      color: #248561;
      border: 1px solid #bbf7d0;
    }

    .diff-pill.hard {
      background: #fff1f2;
      color: #be4b55;
      border: 1px solid #fecdd3;
    }
*/
    .turn-track {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      margin: 0 2px 14px;
    }

    .turn-dot {
      height: 7px;
      border-radius: 999px;
      background: #e2e8f0;
      transition: 0.25s ease;
    }

    .turn-dot.done {
      background: var(--green);
    }

    .turn-dot.current {
      background: var(--orange);
      transform: scaleY(1.35);
      box-shadow: 0 0 0 4px rgba(247, 178, 103, 0.18);
    }

    .grogu-area {
      text-align: center;
    }

    .grogu-frame {
      position: relative;
      display: inline-block;
      padding: 10px;
      border-radius: 32px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      box-shadow: 0 1px 10px rgba(61, 93, 112, 0.16);
    }

    .grogu-frame::before {
      content: "おるすばん中";
      position: absolute;
      left: 50%;
      bottom: -9px;
      transform: translateX(-50%);
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      color: #5f7b70;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .grogu-img {
      width: min(280px, 75vw);
      height: min(280px, 75vw);
      object-fit: cover;
      border-radius: 24px;
      display: block;
      transition: transform 0.3s ease;
    }

    .grogu-img.bounce {
      animation: bounce 0.6s ease;
    }

    @keyframes bounce {
      0% {
        transform: scale(1);
      }

      35% {
        transform: scale(1.08) rotate(-2deg);
      }

      65% {
        transform: scale(0.98) rotate(1deg);
      }

      100% {
        transform: scale(1);
      }
    }

    .grogu-name {
      margin-top: 20px;
      font-size: 16px;
      font-weight: 800;
      color: #325a4d;
    }

    .mood-text {
      min-height: 20px;
      margin-top: 14px;
      font-size: 13px;
      color: #668275;
    }

    .log {
      margin-top: 12px;
      background: #fffaf2;
      border: 1px solid #fde6c8;
      border-radius: 20px;
      padding: 12px 13px;
      min-height: 62px;
      color: #6b5a45;
      font-size: 13px;
      white-space: pre-line;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: inset 0 -2px 0 rgba(255, 218, 168, 0.25);
      line-height: 1;
    }

    .section-title {
      align-items: center;
      gap: 6px;
      margin: 20px auto 10px;
      font-size: 13px;
      font-weight: 800;
      color: #425c52;
      text-align: center;
    }

    body.hard-mode .section-title {
      color: #Cbd5e1;
    }



    .stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .stat-row:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      width: 62px;
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      flex-shrink: 0;
    }

    .bar-bg {
      flex: 1;
      height: 12px;
      border-radius: 999px;
      background: #edf2f7;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(30, 41, 59, 0.08);
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.45s ease;
    }

    .bar-bond {
      background: linear-gradient(90deg, #74d3ae, #a7f3d0);
    }

    .bar-health {
      background: linear-gradient(90deg, #7bb7e8, #bfdbfe);
    }

    .bar-trace {
      background: linear-gradient(90deg, #f59e0b, #ef4444);
    }

    .hard-only {
      display: none;
    }

    body.hard-mode .hard-only {
      display: flex;
    }

    .stat-val {
      width: 30px;
      text-align: right;
      font-size: 12px;
      font-weight: 800;
      color: #475569;
    }

    .snack-warn {
      min-height: 18px;
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #9f5b9a;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .action-btn {
      appearance: none;
      border: 1px solid #e2e8f0;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      border-radius: 18px;
      min-height: 82px;
      padding: 10px 5px;
      cursor: pointer;
      color: var(--text);
      box-shadow: 0 7px 16px rgba(71, 85, 105, 0.09);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.13s ease, box-shadow 0.13s ease, border-color 0.13s ease;
    }

    .action-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(71, 85, 105, 0.12);
      border-color: #b7dfca;
    }

    .action-btn:active:not(:disabled) {
      transform: translateY(0) scale(0.98);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .action-btn .ico {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .action-btn .lbl {
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .action-btn .hint {
      margin-top: 3px;
      font-size: 10px;
      color: #94a3b8;
      line-height: 1.25;
    }

    .action-btn.danger {
      border-color: #fecdd3;
      background: linear-gradient(180deg, #fff7f8, #fff1f2);
    }

    .action-btn.danger .lbl {
      color: #bf5362;
    }

    .action-btn.danger .hint {
      color: #d47a87;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(52, 64, 84, 0.42);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .overlay-box {
      width: min(330px, 100%);
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #fff;
      border-radius: 28px;
      padding: 22px 18px 18px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(51, 65, 85, 0.24);
      animation: popIn 0.25s ease;
    }

    .overlay.collection-mode {
      align-items: flex-start;
    }

    .overlay.collection-mode .overlay-box {
      margin: 0 auto;
      width: min(390px, 100%);
    }

    .overlay.collection-mode .ov-img {
      width: 150px;
      aspect-ratio: 1 / 1;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .ov-img {
      width: 260px;
      aspect-ratio: 4 / 5;
      height: auto;

      object-fit: cover;

      border-radius: 20px;
      display: block;
      margin: 0 auto 13px;

      box-shadow: 0 8px 20px rgba(71, 85, 105, 0.12);
    }

    .hideout-img {
      width: 260px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .ov-title {
      font-size: 18px;
      font-weight: 900;
      color: #325a4d;
      margin-bottom: 8px;
      line-height: 1.45;
    }

    .ov-msg {
      font-size: 13px;
      color: #64748b;
      line-height: 1.85;
      white-space: pre-line;
      margin-bottom: 16px;
    }

    .btn-p {
      border: none;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      padding: 11px 22px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(54, 169, 121, 0.24);
    }

    .btn-p:hover {
      background: var(--green-dark);
    }


    .continue-area {
      margin-top: 12px;
      text-align: center;
    }

    .continue-btn {
      border: none;
      border-radius: 999px;
      background: #65cfa6;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      padding: 10px 20px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(54, 169, 121, 0.22);
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .continue-btn:hover {
      background: #36a979;
      transform: translateY(-1px);
    }

    .continue-btn:active {
      transform: scale(0.98);
    }

    .diff-btns,
    .hideout-btns {
      display: flex;
      flex-direction: column;
      gap: 9px;
      max-height: min(52vh, 430px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-right: 4px;
      overscroll-behavior: contain;
    }

    .collection-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
      padding-right: 4px;
    }

    .collection-card {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 11px 12px;
      background: #f8fafc;
      text-align: left;
    }

    .collection-card.locked {
      opacity: 0.58;
      filter: grayscale(0.7);
    }

    .collection-card strong {
      display: block;
      font-size: 13px;
      color: #325a4d;
      margin-bottom: 3px;
    }

    .collection-card small {
      color: #64748b;
      font-size: 11px;
      line-height: 1.6;
    }

    .collection-rate {
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 800;
      color: #425c52;
    }

    .sub-btn {
      margin-top: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      background: #fff;
      color: #425c52;
      font-weight: 800;
      font-size: 12px;
      padding: 10px 16px;
      cursor: pointer;
    }

    #ovBtns .sub-btn {
      margin-bottom: 40px;
    }

    .diff-btn,
    .hideout-btn {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 13px 14px;
      background: #f8fafc;
      color: #334155;
      text-align: left;
      cursor: pointer;
      transition: 0.14s ease;
    }

    .diff-btn:hover,
    .hideout-btn:hover {
      background: #f0fdf4;
      border-color: #bbf7d0;
      transform: translateY(-1px);
    }

    .diff-btn strong {
      display: block;
      font-size: 14px;
      color: #325a4d;
      margin-bottom: 2px;
    }

    .diff-btn small {
      color: #64748b;
      font-size: 11px;
      line-height: 1.55;
    }

    .action-flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 247, 237, 0.42);
      pointer-events: none;
      z-index: 100;
      animation: flash 0.35s ease forwards;
    }

    @keyframes flash {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    @media (max-width: 390px) {
      body {
        padding: 10px;
      }

      .card {
        border-radius: 22px;
        padding: 14px;
      }

      .grogu-img {
        width: 152px;
        height: 152px;
      }

      .btn-grid {
        gap: 7px;
      }

      .action-btn {
        min-height: 78px;
      }

      .action-btn .lbl {
        font-size: 11px;
      }

      .action-btn .hint {
        font-size: 9px;
      }
    }

    body.hard-mode {
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.25) 0 2px, transparent 3px),
        radial-gradient(circle at 84% 12%, rgba(255, 255, 255, 0.2) 0 2px, transparent 3px),
        radial-gradient(circle at 72% 34%, rgba(255, 255, 255, 0.15) 0 1px, transparent 2px),
        linear-gradient(180deg, #2b0d0d 0%, #4a1626 45%, #111827 100%);
    }

    body.hard-mode .card {
      background: rgba(30, 41, 59, 0.92);
      color: #e2e8f0;
      border-color: rgba(255, 255, 255, 0.1);
    }

    body.hard-mode .app-title h1 {
      background: rgba(30, 41, 59, 0.85);
      color: #f8fafc;
    }

    body.hard-mode .app-title p,
    body.hard-mode .mood-text,
    body.hard-mode .stat-label,
    body.hard-mode .stat-val {
      color: #cbd5e1;
    }

    body.hard-mode .log {
      background: rgba(15, 23, 42, 0.9);
      border-color: rgba(255, 255, 255, 0.08);
      color: #f1f5f9;
    }

    body.hard-mode .action-btn {
      background: linear-gradient(180deg, #4a1626, #2b0d0d);
      border-color: #7f1d1d;
      color: #fff;
    }

    body.hard-mode .action-btn .hint {
      color: #fecaca;
    }

    body.hard-mode .continue-btn {
      background: #dc2626;
    }

    body.hard-mode .continue-btn:hover {
      background: #b91c1c;
    }


    .action-btn.risky {
      border-color: #fed7aa;
      background: linear-gradient(180deg, #fffaf0, #fff7ed);
    }

    .action-btn.risky .lbl {
      color: #9a5b23;
    }

    .action-btn.safe .lbl {
      color: #24735a;
    }

    body.hard-mode .action-btn.risky {
      background: linear-gradient(180deg, #7c2d12, #451a03);
      border-color: #fdba74;
    }

    .rotta-screen {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      overflow: hidden;
      background: linear-gradient(180deg, #fef3c7 0%, #fda4af 55%, #7f1d1d 100%);
      color: #fff;
      text-align: center;
    }

    .rotta-roll {
      position: absolute;
      left: 50%;
      top: -240px;
      width: min(300px, 78vw);
      height: min(300px, 78vw);
      border-radius: 50%;
      background: radial-gradient(circle at 34% 30%, #fff7ed 0 9%, #f9a8d4 10% 42%, #fb7185 43% 100%);
      border: 10px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 24px 80px rgba(127, 29, 29, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 58px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-shadow: 0 3px 0 rgba(127, 29, 29, 0.28);
      transform: translateX(-50%);
      animation: rottaRollDown 2.7s cubic-bezier(.18, .9, .18, 1) forwards;
    }

    .rotta-caption {
      position: absolute;
      left: 50%;
      bottom: 88px;
      width: min(360px, calc(100vw - 44px));
      transform: translateX(-50%);
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-line;
      opacity: 0;
      animation: rottaCaption 1s ease 2.35s forwards;
    }

    .rotta-roll-img {
      position: absolute;
      left: 50%;
      top: -240px;

      width: min(300px, 78vw);

      transform: translateX(-50%);
      animation: rottaRollDown 2.7s cubic-bezier(.18, .9, .18, 1) forwards;
    }

    .rotta-reset-btn {
      position: absolute;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      border: 1px solid rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      border-radius: 999px;
      padding: 11px 24px;
      font-weight: 900;
      cursor: pointer;
      opacity: 0;
      animation: rottaCaption 1s ease 3.05s forwards;
    }

    @keyframes rottaRollDown {
      0% {
        top: -260px;
        transform: translateX(-50%) rotate(0deg) scale(0.9);
      }

      70% {
        top: calc(50% - 150px);
        transform: translateX(-50%) rotate(620deg) scale(1.08);
      }

      100% {
        top: 50%;
        transform: translate(-50%, -50%) rotate(720deg) scale(1.15);
      }
    }

    @keyframes rottaCaption {
      to {
        opacity: 1;
      }
    }


    .dead-end-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      color: #f8fafc;
      display: none;
      padding: 32px;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Segoe UI", sans-serif;
    }

    .dead-end-box {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .dead-story {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(360px, calc(100vw - 48px));
      min-height: 150px;
      font-size: 15px;
      line-height: 2.05;
      letter-spacing: 0.04em;
      white-space: pre-line;
      opacity: 0;
      transform: translate(-50%, calc(-50% + 8px));
      transition: opacity 0.75s ease, transform 0.75s ease;
    }

    .dead-story.show {
      opacity: 1;
      transform: translate(-50%, -50%);
    }

    .dead-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 0.16em;
      color: #b91c1c;
      white-space: nowrap;
    }

    .dead-reset-btn {
      position: absolute;
      left: 50%;
      bottom: 72px;
      transform: translateX(-50%);
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 999px;
      padding: 12px 28px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .dead-reset-btn:hover {
      background: rgba(255, 255, 255, 0.16);
      transform: translateX(-50%) translateY(-1px);
    }


    .hud {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 18px;
      background: #fffaf0;
      border: 2px solid #e4ad45;
    }

    .hud-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: nowrap;
      font-size: 12px;
      font-weight: 900;
      color: #6b4a18;
      white-space: nowrap;
    }

    .hud-sep {
      color: #d6a84f;
    }

    #diffDisp {
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div id="game">
    <div class="app-title" style="display: none;">
      <h1>🌿 グローグーおるすばん日記</h1>
      <p>マンドーが帰ってくるまで、ゆっくりお世話しよう</p>
    </div>

    <div class="card">
      <div class="hud">
        <div class="hud-line">
          <span id="turnDisp">1 / 10</span>
          <span class="hud-sep">｜</span>
          <span>体調 <span id="miniHealth">😆</span></span>
          <span class="hud-sep">｜</span>
          <span>なつき度 <span id="miniBond">0%</span></span>
          <span class="hud-sep">｜</span>
          <span id="diffDisp">やさしい</span>
        </div>
      </div>

      <div class="grogu-area">
        <div class="grogu-frame">
          <img class="grogu-img" id="groguImg" src="https://juju.hits.jp/egao.png" alt="グローグー">
        </div>
        <div class="mood-text" id="moodText">…</div>
        <div class="log" id="logText">…</div>
      </div>

      <div id="actionCard">
        <div id="actionPanel">
          <div class="section-title">なにをする？</div>
          <div class="btn-grid" id="actionGrid"></div>
        </div>
        <div id="continuePanel" style="display:none; text-align:center; padding: 8px 0;">
          <button class="continue-btn" id="continueBtn">🐾 つづける</button>
        </div>
      </div>
    </div>




    <div class="card" style="display: none;">
      <div class="section-title">グローグーのようす</div>
      <div class="stat-row">
        <span class="stat-label">なつき度</span>
        <div class="bar-bg">
          <div class="bar-fill bar-bond" id="barBond" style="width:0%"></div>
        </div>
        <span class="stat-val" id="valBond">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">げんき</span>
        <div class="bar-bg">
          <div class="bar-fill bar-health" id="barHealth" style="width:80%"></div>
        </div>
        <span class="stat-val" id="valHealth">80</span>
      </div>
      <div class="stat-row hard-only" id="traceRow">
        <span class="stat-label">気配</span>
        <div class="bar-bg">
          <div class="bar-fill bar-trace" id="barTrace" style="width:0%"></div>
        </div>
        <span class="stat-val" id="valTrace">静</span>
      </div>
      <div class="snack-warn" id="snackWarn"></div>
    </div>



    <div id="overlay" class="overlay" style="display:none">
      <div class="overlay-box">
        <img class="ov-img" id="ovImg" src="" alt="">
        <div class="ov-title" id="ovTitle"></div>
        <div class="ov-msg" id="ovMsg"></div>
        <div id="ovBtns"></div>
      </div>
    </div>
  </div>



  <div id="deadEndScreen" class="dead-end-screen">
    <div class="dead-end-box">
      <div id="deadStory" class="dead-story"></div>
      <div id="deadTitle" class="dead-title">DEAD END</div>
      <button id="deadResetBtn" class="dead-reset-btn" onclick="resetFromDeadEnd()">最初に戻る</button>
    </div>
  </div>


  <div id="rottaScreen" class="rotta-screen">
    <img src="image/rotta.gif" class="rotta-roll-img">

    <div class="rotta-caption" id="rottaCaption"></div>

    <button class="rotta-reset-btn" onclick="resetFromRotta()">
      最初に戻る
    </button>
  </div>


  <script src="script/game.js" defer></script>

</body>

</html>
